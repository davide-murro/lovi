<div class="section flex flex-wrap gap-2">
  <a i18n class="link font-medium leading-normal" [routerLink]="['/audio-books']" title="Audio Books">Audio Books</a>
  <span class="text-accent font-medium leading-normal">/</span>
  <span class="font-medium leading-normal">{{ audioBook().name }}</span>
</div>

<div class="flex flex-col md:gap-4 md:flex-row lg:gap-8">
  <div class="flex justify-center items-start">
    <img
      class="w-full flex flex-col justify-center aspect-[3/4] object-cover bg-accent overflow-hidden rounded-xl max-w-[300px] md:min-w-[250px] lg:min-w-[300px]"
      [secureSrc]="audioBook().coverImageUrl" [secureOffline]="true" [alt]="audioBook().name" />
  </div>

  <div class="flex-grow">
    <div class="title flex justify-between items-start gap-2">
      <h1 class="flex-1">{{ audioBook().name }}</h1>

      <button i18n-title *appAuth type="button" class="button button-accent shrink-0 gap-2"
        title="Add to / remove from My Library" [disabled]="isMyLibraryLoading()" (click)="toggleMyLibrary()">
        @if(isMyLibraryLoading()) {
        <fa-icon [icon]="faCircleNotch" class="animate-spin" />
        <span i18n class="hidden lg:inline">Loading...</span>
        } @else if(isInMyLibrary()) {
        <fa-icon [icon]="faBookBookmark" />
        <span i18n class="hidden lg:inline">Remove from My Library</span>
        } @else {
        <fa-icon [icon]="faBookOpen" />
        <span i18n class="hidden lg:inline">Add to My Library</span>
        }
      </button>

      <button i18n-title *appAuth type="button" class="button button-accent shrink-0 gap-2"
        title="Download / remove from offline" [disabled]="isOfflineLoading()" (click)="toggleOffline()">
        @if(isOfflineLoading()) {
        <fa-icon [icon]="faCircleNotch" animation="spin" />
        <span i18n class="hidden lg:inline">Loading...</span>
        } @else if(isOffline()) {
        <fa-icon [icon]="faFileArrowDown" />
        <span i18n class="hidden lg:inline">Remove offline</span>
        } @else {
        <fa-icon [icon]="faFile" />
        <span i18n class="hidden lg:inline">Download offline</span>
        }
      </button>
    </div>

    <p class="subtitle text-accent">
      @for(creator of audioBook().readers; track $index) {
      <a>{{ creator.nickname }}</a>@if (!$last) {, } }
    </p>

    <div class="section flex flex-1 gap-4 flex-wrap items-center justify-start">
      <button i18n-title type="button" class="icon-button button-primary button-xl" title="Play / Pause"
        [disabled]="isCurrentTrackLoading()" (click)="togglePlay()">
        @if(isCurrentTrackLoading()) { <fa-icon [icon]="faCircleNotch" animation="spin" />
        } @else if(isCurrentTrackPlaying()) {<fa-icon [icon]="faPause" />
        } @else {<fa-icon [icon]="faPlay" />}
      </button>

      <button i18n-title type="button" class="button button-primary button-rounded shrink-0 gap-2" title="Add to queue"
        (click)="addToQueue()">
        <fa-icon [icon]="faList" />
        <span i18n>Add to queue</span>
      </button>
    </div>

    <p class="section whitespace-pre-line">
      {{ audioBook().description }}
    </p>
  </div>
</div>
