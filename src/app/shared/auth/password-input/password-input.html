<div class="relative w-full">
    <input #passwordInput [type]="showPassword() ? 'text' : 'password'" [autocomplete]="autocomplete()" [id]="id()"
        [placeholder]="placeholder()" [value]="value" [disabled]="disabled" (input)="onInput($event)"
        (blur)="onTouched()" class="input w-full !pr-15" [class]="class()" [class.!pr-17]="class().includes('input-lg')"
        [autofocus]="autofocus()" />

    <button i18n-title type="button" [title]="showPassword() ? 'Hide password' : 'Show password'"
        class="input-button absolute right-0 top-0" [class.input-button-lg]="class().includes('input-lg')"
        [class.text-primary]="showPassword()" [disabled]="disabled" (click)="togglePasswordVisibility()">
        <fa-icon [icon]="showPassword() ? faEye : faEyeSlash" />
    </button>
</div>
