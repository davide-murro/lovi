<h2 i18n class="title2 !pt-0">Email already taken</h2>
<p i18n class="section">The email you are trying to register with is already taken. If you have lost access to your
    account, please use the forgot password functionality.</p>
<div class="flex justify-center gap-4">
    <a i18n i18n-title type="button" class="button button-accent" title="Forgot password"
        [routerLink]="['/auth', 'forgot-password']" [queryParams]="{ email: email || null }">Forgot password
    </a>
    <button i18n i18n-title type="button" class="button button-accent" title="Cancel" (click)="cancel()">Cancel</button>
</div>
