<h2 i18n class="title2 !pt-0">Email not confirmed</h2>
<p i18n class="section">Please confirm your email address by clicking the link in the email we've sent you.
    If you haven't received the confirmation email, check your spam folder or request a new one.</p>
<div class="flex justify-center gap-4">
    <button i18n i18n-title type="button" class="button button-primary" title="Resend link" (click)="submit()"
        [disabled]="isLoading()">Resend link</button>
    <button i18n i18n-title autofocus type="button" class="button button-accent" title="Cancel"
        (click)="cancel()">Cancel</button>
</div>
