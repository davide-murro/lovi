<a i18n-title class="link-item flex items-center gap-2 sm:gap-4"
  [routerLink]="['/podcasts', podcast().id, 'episodes', podcastEpisode().id]" title="Go to Podcast Episode">
  <img class="size-16 aspect-square object-cover bg-accent rounded-xl sm:size-24" loading="lazy" decoding="async"
    [secureSrc]="podcastEpisode().coverImagePreviewUrl" [secureOffline]="true" [alt]="podcastEpisode().name" />
  <div class="overflow-hidden">
    <p class="text-base font-medium leading-normal line-clamp-2 sm:line-clamp-3">{{ podcastEpisode().name }}</p>
    <p i18n class="text-accent text-sm truncate">Episode {{ podcastEpisode().number }}</p>
    <p class="text-accent text-sm truncate">
      @for(creator of podcastEpisode().voicers; track $index) {
      {{ creator.nickname }}@if (!$last) {, } }
    </p>
  </div>
</a>
