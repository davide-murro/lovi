<header class="border-b-2 border-accent p-4 flex flex-col max-sm:transition-[gap] max-sm:duration-300 sm:gap-4 sm:px-8"
    [class.max-sm:gap-4]="menuMobileOpen()" [class.max-sm:gap-0]="!menuMobileOpen()">
    <div class="flex items-center justify-start gap-2 whitespace-nowrap sm:gap-4">
        <a i18n-title title="Home" class="shrink-0 logo-link" [routerLink]="['/']">
            <img src="logo/logo-transparent.png" title="LOVI" alt="LOVI" width="136" height="45"
                class="w-auto h-[40px] sm:h-[45px]" />
        </a>

        <div class="flex-1"></div>

        <ng-template #signIn>
            <a i18n i18n-title class="button button-accent shrink-0" title="Sign in" [routerLink]="['/auth', 'login']"
                [routerLinkActive]="'button-primary'">Sign in</a>
        </ng-template>
        <a i18n-title *appAuth="null; else signIn" class="icon-button" title="Go to User Profile"
            [routerLink]="['/user-profile']" [routerLinkActive]="'text-primary'">
            <fa-icon [icon]="faUser" />
        </a>

        <button i18n-title type="button" class="icon-button sm:!hidden"
            [title]="menuMobileOpen() ? 'Close menu' : 'Open menu'" (click)="menuMobileOpen.set(!menuMobileOpen())">
            @if (menuMobileOpen()) {
            <fa-icon [icon]="faClose" />
            } @else {
            <fa-icon [icon]="faBars" />
            }
        </button>
    </div>

    <div class="max-sm:grid max-sm:transition-[grid-template-rows,opacity] max-sm:duration-300"
        [class.max-sm:pointer-events-none]="!menuMobileOpen()" [class.max-sm:pointer-events-auto]="menuMobileOpen()"
        [class.max-sm:grid-rows-[1fr]]="menuMobileOpen()" [class.max-sm:grid-rows-[0fr]]="!menuMobileOpen()"
        [class.max-sm:opacity-0]="!menuMobileOpen()" [class.max-sm:opacity-100]="menuMobileOpen()">
        <div
            class="flex items-center justify-start whitespace-nowrap flex-col gap-4 overflow-hidden -m-4 p-4 sm:-mx-8 sm:px-8 sm:overflow-auto sm:flex-row sm:gap-8">
            <a i18n i18n-title class="menu-link" title="Go to Audio Books" [routerLink]="['/audio-books']"
                [routerLinkActive]="'active'">Audio Books</a>
            <a i18n i18n-title class="menu-link" title="Go to Podcasts" [routerLink]="['/podcasts']"
                [routerLinkActive]="'active'">Podcasts</a>
            <a i18n i18n-title *appAuth class="menu-link" title="Go to My Library" [routerLink]="['/my-library']"
                [routerLinkActive]="'active'">My Library</a>
            <a i18n i18n-title *appAuth="['Admin', 'Editor']" class="menu-link" title="Go to Edit"
                [routerLink]="['/edit']" [routerLinkActive]="'active'">Edit</a>

            <span class="flex-grow hidden sm:flex"></span>

            <form [formGroup]="searchForm" (ngSubmit)="onSearchSubmit()" class="flex items-center relative max-w-full">
                <input i18n-placeholder type="search" formControlName="search" id="search" class="input !pr-15"
                    placeholder="Search" autocomplete="on" />
                <button i18n-title type="submit" title="Search for Audio Books or Podcasts"
                    class="input-button absolute right-0" [disabled]="!searchForm.valid">
                    <fa-icon [icon]="faMagnifyingGlass" />
                </button>
            </form>
        </div>
    </div>
</header>
