<a i18n-title class="link-item flex flex-1 flex-col gap-2" [routerLink]="['/books', book().id]" title="Go to Book">
  <img class="aspect-[3/4] object-cover bg-accent rounded-xl" loading="lazy" decoding="async"
    [secureSrc]="book().coverImagePreviewUrl" [secureOffline]="true" [alt]="book().name" />
  <div>
    <p class="text-base font-medium leading-normal line-clamp-2">{{ book().name }}</p>
    <p class="text-accent text-sm truncate">
      @for(creator of creators(); track $index) {
      {{ creator }}@if (!$last) {, } }
    </p>
  </div>
</a>
