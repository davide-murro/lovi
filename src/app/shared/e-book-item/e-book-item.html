<a i18n-title class="link-item flex flex-1 flex-col gap-2" [routerLink]="['/e-books', eBook().id]" title="Go to eBook">
  <img class="aspect-[3/4] object-cover bg-accent rounded-xl" loading="lazy" decoding="async"
    [secureSrc]="eBook().coverImagePreviewUrl" [secureOffline]="true" [alt]="eBook().name" />
  <div>
    <p class="text-base font-medium leading-normal line-clamp-2">{{ eBook().name }}</p>
    <p class="text-accent text-sm truncate">
      @for(creator of eBook().writers; track $index) {
      {{ creator.nickname }}@if (!$last) {, } }
    </p>
  </div>
</a>
