<div class="fixed top-0 right-0 z-60 space-y-2 w-[100%] max-h-[100%] overflow-auto p-4 text-sm sm:w-120 sm:text-base"
    [class.hidden]="toasterService.toasts() == null || toasterService.toasts().length == 0">
    @for (toast of toasterService.toasts(); track toast.id) {
    <div class="px-4 py-2 rounded-xl flex justify-between items-center gap-2 border-2 border-accent-light" [class]="{
          'bg-accent': toast.type === 'info',
          'bg-success': toast.type === 'success',
          'bg-error': toast.type === 'error',
          'bg-warning': toast.type === 'warning'
        }">
        <span class="flex-grow">{{ toast.message }}</span>
        <button i18n-title type="button" class="icon-button" title="Close" (click)="toasterService.dismiss(toast.id!)">
            <fa-icon [icon]="faClose" />
        </button>
    </div>
    }
</div>
