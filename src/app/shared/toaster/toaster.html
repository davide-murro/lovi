<div class="toaster-container space-y-2 p-4 w-full text-sm sm:w-120 sm:text-base"
    [class]="toasterService.toasts().length > 0 ? 'pointer-events-auto visible' : 'pointer-events-none invisible'">
    @for (toast of toasterService.toasts(); track toast.id) {
    <div animate.enter="toast-in-animation" animate.leave="toast-out-animation"
        class="px-4 py-2 rounded-xl flex justify-between items-center gap-2 border-2 border-accent-light" [class]="{
          'bg-accent': toast.type === 'info',
          'bg-success': toast.type === 'success',
          'bg-error': toast.type === 'error',
          'bg-warning': toast.type === 'warning'
        }">
        <span class="flex-grow">{{ toast.message }}</span>
        <button i18n-title type="button" class="icon-button" title="Close" (click)="toasterService.dismiss(toast.id!)">
            <fa-icon [icon]="faClose" />
        </button>
    </div>
    }
</div>
