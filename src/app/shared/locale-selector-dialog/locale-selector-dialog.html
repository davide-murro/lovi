<h2 i18n class="title2 text-center !pt-0">Select language</h2>

<div class="section flex">
    <ul role="list" class="flex flex-col flex-grow w-full -mx-4 sm:mx-0">
        @for (locale of locales; track $index) {
        <li class="list-item-button flex items-center p-4 gap-2 cursor-pointer sm:gap-4" [class.bg-opacity]="locale.code === localeSelected()" (click)="selectLocale(locale)">
            <img [src]="locale.iconPath" [title]="locale.label" [alt]="locale.label" class="h-6">
            <div class="flex flex-col flex-grow overflow-hidden">
                <span class="truncate">{{ locale.label }}</span>
            </div>
        </li>
        }
    </ul>
</div>
