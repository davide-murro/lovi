<h1 i18n class="title">Not found</h1>
<p i18n class="section text-accent">Element not found or not available Offline. Please try reloading the page or go
    back.</p>
<p class="section flex gap-4 items-center">
    <a i18n i18n-title href="javascript:window.location.href=window.location.href" class="button button-accent shrink-0"
        title="Reload current page">Reload</a>
    <a i18n i18n-title href="javascript:window.history.back()" class="button button-accent shrink-0"
        title="Go back to previous page">Go
        back</a>
</p>
