<h1 i18n class="title">Not found</h1>
<p i18n class="section text-accent">Element not found or not available offline. Please try reloading the page or
    navigating to My Library Offline.</p>
<p class="section flex gap-4 items-center">
    <a i18n i18n-title href="javascript:window.location.href=window.location.href" class="button button-accent shrink-0"
        title="Reload">Reload</a>
    <a i18n i18n-title class="button button-accent shrink-0" title="My Library Offline"
        [routerLink]="['/my-library', 'offline']">My Library Offline</a>
</p>
